<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UFC 6 — Fight Generator</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--blood:#C0181A;--gold:#D4A017;--dark:#0A0A0A;--panel:#141414;--border:#2A2A2A;--muted:#555;--text:#E8E8E8;--dim:#888;}
body{background:var(--dark);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:32px 16px 64px;overflow-x:hidden;}
.logo{font-family:'Bebas Neue',sans-serif;font-size:clamp(2rem,8vw,4.5rem);letter-spacing:0.04em;color:var(--text);text-align:center;line-height:1;}
.logo span{color:var(--blood);}
.subtitle{font-size:0.75rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--dim);margin-top:6px;text-align:center;}
.card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:28px 24px;width:100%;max-width:760px;margin-top:36px;}
.filter-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:20px;}
.pill{font-size:0.67rem;letter-spacing:0.1em;text-transform:uppercase;padding:5px 11px;border-radius:20px;border:1px solid var(--border);background:#111;color:var(--dim);cursor:pointer;transition:all 0.12s;}
.pill:hover{border-color:var(--blood);color:var(--text);}
.pill.active{background:var(--blood);border-color:var(--blood);color:#fff;}
.pill.ow.active{background:linear-gradient(135deg,#7B00FF,#FF6B00);border-color:#9B30FF;color:#fff;}
.btn-wrap{display:flex;justify-content:center;margin-bottom:0;}
.btn-gen{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:0.1em;background:var(--blood);color:#fff;border:none;border-radius:8px;padding:14px 48px;cursor:pointer;transition:transform 0.12s,background 0.15s;}
.btn-gen:hover{background:#e01f22;transform:scale(1.03);}
.btn-gen:active{transform:scale(0.97);}
#result{display:none;flex-direction:column;gap:16px;margin-top:28px;}
.fight-row{display:grid;grid-template-columns:1fr 60px 1fr;align-items:center;}
.fighter-panel{background:#1C1C1C;border:1px solid var(--border);border-radius:10px;padding:20px 16px;display:flex;flex-direction:column;align-items:center;gap:6px;text-align:center;}
.fp-owner{font-size:0.62rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--dim);}
.fp-name{font-family:'Bebas Neue',sans-serif;font-size:clamp(1.1rem,4vw,1.8rem);letter-spacing:0.04em;line-height:1.1;color:var(--text);}
.fp-division{font-size:0.68rem;letter-spacing:0.12em;text-transform:uppercase;padding:3px 8px;border-radius:10px;background:rgba(192,24,26,0.15);color:var(--blood);}
.vs-col{display:flex;align-items:center;justify-content:center;}
.vs-badge{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;color:var(--blood);letter-spacing:0.08em;}
.scenario-box{background:#1A1A1A;border:1px solid var(--border);border-left:3px solid var(--gold);border-radius:10px;padding:16px 14px;}
.scenario-label{font-size:0.6rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--gold);margin-bottom:8px;font-weight:600;}
.scenario-text{font-size:0.86rem;line-height:1.65;color:#AAA;}
.cursor{display:inline-block;width:2px;height:0.85em;background:var(--gold);margin-left:2px;vertical-align:text-bottom;animation:blink 0.7s steps(1) infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}
</style>
</head>

let activeFilter='all';
document.querySelectorAll('.pill').forEach(p=>{p.addEventListener('click',()=>{document.querySelectorAll('.pill').forEach(x=>x.classList.remove('active'));p.classList.add('active');activeFilter=p.dataset.filter;});});
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function getPool(){
  if(activeFilter==='openweight'||activeFilter==='all') return ALL;
  return ALL.filter(c=>c.t.includes(activeFilter));
}
function typewrite(el,text,speed=16){el.innerHTML='';let i=0;const cur=document.createElement('span');cur.className='cursor';el.appendChild(cur);const tick=()=>{if(i<text.length){el.insertBefore(document.createTextNode(text[i++]),cur);setTimeout(tick,speed);}else{cur.remove();}};tick();}
document.getElementById('genBtn').addEventListener('click',()=>{
  const pool=getPool();
  if(pool.length<2){alert('Not enough fighters in this filter.');return;}
  const s=shuffle(pool);
  const f1=s[0],f2=s.find(c=>c.n!==f1.n);
  if(!f2){alert('Need at least 2 fighters.');return;}
  const [joe,cpu]=Math.random()<0.5?[f1,f2]:[f2,f1];

  document.getElementById('divJoe').textContent=joe.d;
